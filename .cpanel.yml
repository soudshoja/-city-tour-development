---
deployment:
  tasks:
    - export DEPLOYPATH=/home/citycomm/tour.citycommerce.group/
    - /bin/cp -R * $DEPLOYPATH

    # Navigate to the deployment directory for Laravel commands
    - cd $DEPLOYPATH

    # Ensure permissions are correct after copying (exclude node_modules)
    - find . -not -path './node_modules/*' -type f -exec chmod 644 {} \;
    - find . -not -path './node_modules/*' -type d -exec chmod 755 {} \;
    - chmod -R 775 storage
    - chmod -R 775 bootstrap/cache

    # Build frontend assets
    - npm install
    - npm run build

    # Laravel deployment
    - ~/composer.phar install --no-dev --prefer-dist
    - php artisan down
    - php artisan migrate --force
    - php artisan lighthouse:cache
    - php artisan optimize:clear
    - php artisan up
