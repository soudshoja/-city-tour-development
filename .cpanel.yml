---
deployment:
  tasks:
    - export DEPLOYPATH=/home/citycomm/staging.citycommerce.group/
    - /bin/cp -R * $DEPLOYPATH

    # Navigate to the deployment directory for Laravel commands
    - cd $DEPLOYPATH

    # Ensure permissions are correct after copying (important for Laravel)
    - find . -type f -exec chmod 644 {} \; # Files
    - find . -type d -exec chmod 755 {} \; # Directories
    - chmod -R 775 storage
    - chmod -R 775 bootstrap/cache

    # Put the application in maintenance mode
    - /usr/local/bin/php artisan down

    # Install Composer dependencies (CORRECTED PATH)
    - /usr/local/bin/php /opt/cpanel/composer/bin/composer install --no-dev --prefer-dist

    # # Run database migrations
    - /usr/local/bin/php artisan migrate --force

    # # Clear caches and optimize (optional but recommended)
    # - /usr/local/bin/php artisan cache:clear
    # - /usr/local/bin/php artisan config:cache
    # - /usr/local/bin/php artisan route:cache
    # - /usr/local/bin/php artisan view:cache

    # Take the application out of maintenance mode
    - /usr/local/bin/php artisan up