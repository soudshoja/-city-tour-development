name: Deploy to cPanel

on:
  push:
    branches:
      - main  # or your default branch name

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node @v3
      with:
        node-version: '23'  # Use the Node.js version required by your project

    - name: Install dependencies
      run: npm install
      
    - name: Build assets
      run: npm run build

    - name: Deploy to cPanel via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        local-dir: ./  # Path to your build output
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: ${{ secrets.FTP_PORT }}
        protocol: 'ftp'  # or 'sftp' if you're using SFTP
        dry-run: false

    - name: Generate version.json
      run: |
        echo "{ \"commit\": \"$(git rev-parse --short HEAD)\", \"branch\": \"$(git rev-parse --abbrev-ref HEAD)\", \"date\": \"$(git log -1 --format=%ci)\" }" > public/version.json