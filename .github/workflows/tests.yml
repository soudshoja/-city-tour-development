name: Laravel Tests

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: laravel_test_password
          MYSQL_DATABASE: laravel_testing
          MYSQL_USER: laravel_user
          MYSQL_PASSWORD: laravel_user_password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping --silent" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, mysql
        coverage: xdebug

    - name: Configure Laravel Environment
      run: |
        if [ -f .env.example ]; then
          cp .env.example .env
        else
          touch .env
        fi
        echo "APP_NAME=\"City Tour\"" >> .env
        echo "APP_ENV=testing" >> .env
        echo "APP_DEBUG=true" >> .env
        echo "APP_URL=http://127.0.0.1:8000" >> .env
        echo "DB_CONNECTION=mysql" >> .env
        echo "DB_HOST=127.0.0.1" >> .env
        echo "DB_PORT=3306" >> .env
        echo "DB_DATABASE=laravel_testing" >> .env
        echo "DB_USERNAME=laravel_user" >> .env
        echo "DB_PASSWORD=laravel_user_password" >> .env
        echo "DB_DATABASE_MAP=map_data_citytour" >> .env
        echo "DB_USERNAME_MAP=laravel_user" >> .env
        echo "DB_PASSWORD_MAP=laravel_user_password" >> .env
        echo "DB_HOST_MAP=127.0.0.1" >> .env
        echo "DB_PORT_MAP=3306" >> .env
        echo "CACHE_STORE=array" >> .env
        echo "SESSION_DRIVER=array" >> .env
        echo "QUEUE_CONNECTION=sync" >> .env
        echo "MAIL_MAILER=log" >> .env
        echo "MAIL_FROM_ADDRESS=test@example.com" >> .env
        echo "MAIL_FROM_NAME='City Tour Test'" >> .env

    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Generate key
      run: php artisan key:generate

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Wait for MySQL to be ready
      run: |
        until mysqladmin ping -h"127.0.0.1" --silent; do
          echo 'Waiting for MySQL to be available...'
          sleep 2
        done
        echo 'MySQL is ready!'

    - name: Create Map Database and Grant Permissions
      run: |
        mysql -h 127.0.0.1 -P 3306 -u root -plaravel_test_password -e "CREATE DATABASE IF NOT EXISTS map_data_citytour CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
        mysql -h 127.0.0.1 -P 3306 -u root -plaravel_test_password -e "GRANT ALL PRIVILEGES ON map_data_citytour.* TO 'laravel_user'@'%';"
        mysql -h 127.0.0.1 -P 3306 -u root -plaravel_test_password -e "FLUSH PRIVILEGES;"

    - name: Verify Database Connection
      run: |
        mysql -h 127.0.0.1 -P 3306 -u laravel_user -plaravel_user_password -e "SHOW DATABASES;"

    - name: Run Database Migrations
      run: |
        echo "Running main database migrations..."
        php artisan migrate --force
        echo "Running map database migrations..."
        php artisan migrate --database=mysql_map --force || echo "Map migrations completed with warnings (this may be normal)"

    - name: Run Tests
      run: vendor/bin/phpunit --stop-on-failure --filter="ProcessAirFile"

    - name: Upload Coverage Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: storage/logs/
