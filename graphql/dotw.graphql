    "Always false — getBookingDetails never caches results."
    cached: Boolean!

    "Full booking details on success. Null on failure."
    data: BookingDetails
}

"Response envelope for searchBookings query."
type SearchBookingsResponse {
    "Whether the search succeeded."
    success: Boolean!

    "Structured error — present only when success is false."
    error: DotwError

    "Per-request tracing metadata — always present."
    meta: DotwMeta!

    "Always false — searchBookings never caches results."
    cached: Boolean!

    "Search results on success. Null on failure."
    data: SearchBookingsData
}

extend type Mutation {
    "Save a hotel booking as an itinerary for APR (non-refundable) rates. Returns itinerary_code to pass to bookItinerary."
    saveBooking(input: SaveBookingInput! @spread): SaveBookingResponse!
        @field(resolver: "App\\GraphQL\\Mutations\\DotwSaveBooking")

    "Confirm a previously saved itinerary (from saveBooking). Completes the APR booking flow."
    bookItinerary(input: BookItineraryInput! @spread): BookItineraryResponse!
        @field(resolver: "App\\GraphQL\\Mutations\\DotwBookItinerary")
}

extend type Query {
