    "Search DOTW bookings by date range and/or customer reference. At least one filter required."
    searchBookings(input: SearchBookingsInput! @spread): SearchBookingsResponse!
        @field(resolver: "App\\GraphQL\\Queries\\DotwSearchBookings")
}

# =============================================================================
# Phase 9: Cancellation Operations (CANCEL-01..03)
# =============================================================================

"Input for the checkCancellation query — retrieve cancellation charge before committing."
input CheckCancellationInput {
    "DOTW booking confirmation code to check cancellation charge for."
    booking_code: String!
}

"Input for the cancelBooking mutation — confirm cancellation with the penalty amount from checkCancellation."
input CancelBookingInput {
    "DOTW booking confirmation code to cancel."
    booking_code: String!

    "Penalty amount returned by checkCancellation. Must be passed back verbatim to confirm cancellation."
    penalty_applied: Float!
}

"Input for the deleteItinerary mutation — remove a saved (unconfirmed) APR itinerary."
input DeleteItineraryInput {
    "Itinerary code returned from saveBooking (APR flow only)."
    itinerary_code: String!
}

"Data returned by checkCancellation — the charge incurred if cancellation is confirmed."
type CancellationChargeData {
    "DOTW booking confirmation code (echo of input)."
    booking_code: String!

    "Cancellation charge amount. Pass this as penalty_applied to cancelBooking."
    charge: Float!

    "Currency of the cancellation charge. Empty string if DOTW does not return currency in cancel query."
    currency: String!

    "True when charge is 0.0 — indicates the booking is outside the penalty deadline (free cancellation)."
    is_outside_deadline: Boolean!
}

"Data returned by cancelBooking — result of confirmed cancellation."
type CancelBookingData {
    "DOTW booking confirmation code (echo of input)."
    booking_code: String!

    "True when the cancellation was successfully processed by DOTW."
    cancelled: Boolean!

    "Penalty amount that was applied (echo of input penalty_applied)."
    penalty_applied: Float!

    """
    Number of products remaining on the itinerary after cancellation.
    0 = full cancellation, >0 = partial cancellation (some rooms/products still active).
    Maps to DOTW productsLeftOnItinerary field.
    """
    products_left_on_itinerary: Int!
}

"Data returned by deleteItinerary — confirmation of itinerary deletion."
type DeleteItineraryData {
    "Itinerary code that was deleted (echo of input)."
    itinerary_code: String!

    "True when the itinerary was successfully deleted."
    deleted: Boolean!
}

"Response envelope for the checkCancellation query."
type CheckCancellationResponse {
    "Whether the operation succeeded."
    success: Boolean!

    "Structured error — present only when success is false."
    error: DotwError

    "Per-request tracing metadata — always present."
    meta: DotwMeta!

    "Always false — checkCancellation is never cached."
    cached: Boolean!

    "Cancellation charge data on success. Null on failure."
    data: CancellationChargeData
}

"Response envelope for the cancelBooking mutation."
type CancelBookingResponse {
    "Whether the operation succeeded."
    success: Boolean!

    "Structured error — present only when success is false."
    error: DotwError

    "Per-request tracing metadata — always present."
    meta: DotwMeta!

    "Always false — cancelBooking is a side-effecting mutation, never cached."
    cached: Boolean!

    "Cancellation result data on success. Null on failure."
    data: CancelBookingData
}

"Response envelope for the deleteItinerary mutation."
type DeleteItineraryResponse {
    "Whether the operation succeeded."
    success: Boolean!

    "Structured error — present only when success is false."
    error: DotwError

    "Per-request tracing metadata — always present."
    meta: DotwMeta!

    "Always false — deleteItinerary is a side-effecting mutation, never cached."
    cached: Boolean!

    "Deletion result data on success. Null on failure."
    data: DeleteItineraryData
}

extend type Query {
    """
    Check the cancellation charge for a confirmed DOTW booking without committing the cancellation.

    Calls DOTW cancelbooking with confirm=no. Returns the penalty charge that will be applied
    if cancelBooking is called. Use the returned charge value as penalty_applied in cancelBooking.

    This is step 1 of the two-step DOTW cancellation flow (CANCEL-01).
    """
    checkCancellation(input: CheckCancellationInput! @spread): CheckCancellationResponse!
        @field(resolver: "App\\GraphQL\\Queries\\DotwCheckCancellation")
}

extend type Mutation {
    """
    Confirm cancellation of a DOTW hotel booking with the penalty amount from checkCancellation.

    Calls DOTW cancelbooking with confirm=yes and penaltyApplied. APR (non-refundable) bookings
    are rejected before any DOTW call is made (VALID-02). Returns cancelled=true and
    products_left_on_itinerary on success.

    This is step 2 of the two-step DOTW cancellation flow (CANCEL-02).
    """
    cancelBooking(input: CancelBookingInput! @spread): CancelBookingResponse!
        @field(resolver: "App\\GraphQL\\Mutations\\DotwCancelBooking")

    """
    Delete a saved (unconfirmed) itinerary from the APR flow.

    Calls DOTW deleteitinerary command to remove an itinerary created by saveBooking
    that has not yet been confirmed via bookItinerary. Only applicable for APR bookings.
    Cannot delete confirmed bookings — use cancelBooking for those (CANCEL-03).
    """
    deleteItinerary(input: DeleteItineraryInput! @spread): DeleteItineraryResponse!
        @field(resolver: "App\\GraphQL\\Mutations\\DotwDeleteItinerary")
}

