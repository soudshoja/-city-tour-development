# --- Query definitions ---

extend type Query {
    "Get all DOTW internal country codes. Use nationality/residenceCountry values from this list when building booking passenger details. (LOOKUP-01)"
    getAllCountries: GetAllCountriesResponse!
        @field(resolver: "App\\GraphQL\\Queries\\DotwGetAllCountries")

    "Get countries for which DOTW has hotel inventory. Use to populate destination country selection in search UI. (LOOKUP-02)"
    getServingCountries: GetServingCountriesResponse!
        @field(resolver: "App\\GraphQL\\Queries\\DotwGetServingCountries")

    "Get hotel star rating classification codes. Use as minRating/maxRating filter values in searchHotels. (LOOKUP-03)"
    getHotelClassifications: GetHotelClassificationsResponse!
        @field(resolver: "App\\GraphQL\\Queries\\DotwGetHotelClassifications")

    "Get location filtering codes for hotel search. Use as location filters to narrow results to specific areas. (LOOKUP-04)"
    getLocationIds: GetLocationIdsResponse!
        @field(resolver: "App\\GraphQL\\Queries\\DotwGetLocationIds")

    "Get amenity, leisure, and business facility codes merged from three DOTW commands. Use as amenity filter values in searchHotels. (LOOKUP-05, LOOKUP-06, LOOKUP-07)"
    getAmenityIds: GetAmenityIdsResponse!
        @field(resolver: "App\\GraphQL\\Queries\\DotwGetAmenityIds")

    "Get hotel preference codes from DOTW. Use as preference filter values in hotel search requests. (LOOKUP-05 preference subset)"
    getPreferenceIds: GetPreferenceIdsResponse!
        @field(resolver: "App\\GraphQL\\Queries\\DotwGetPreferenceIds")

    "Get hotel chain affiliation codes from DOTW. Use to filter search results to specific hotel chains. (LOOKUP-07 chain subset)"
    getChainIds: GetChainIdsResponse!
        @field(resolver: "App\\GraphQL\\Queries\\DotwGetChainIds")
}
